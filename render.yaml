services:
  - type: web
    name: rut-verifier-api
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DIAN_DOCUMENT
        sync: false
      - key: DIAN_PASSWORD
        sync: false
      - key: PLAYWRIGHT_HEADLESS
        value: "true"
      - key: FRONTEND_URL
        value: https://rut-verifier-frontend.onrender.com
    healthCheckPath: /api/v1/health
    # Optimization for Render Free Tier:
    # Adding grace period to allow Chromium and the bot to initialize properly.
    healthCheckWaitAfterBuild: 60

  - type: web
    name: rut-verifier-frontend
    runtime: static
    buildCommand: pnpm install && pnpm run build
    staticPublishPath: ./frontend/dist
    rootDir: ./frontend
    envVars:
      - key: PUBLIC_API_URL
        value: https://rut-verifier-api.onrender.com
